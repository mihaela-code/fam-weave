<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FamWeave — Календар</title>
  </head>
  <body>
    <div id="navbar"></div>
    <main class="container py-4">
      <h1>Календар</h1>
      <div id="alertContainer"></div>

      <div class="card mb-4 d-none" id="addEventSection">
        <div class="card-body">
          <h2 class="h5 card-title">Добави събитие</h2>
          <div
            class="alert alert-warning d-none d-flex justify-content-between align-items-center"
            id="editWarning"
            role="alert"
          >
            <span>Редактирате съществуващо събитие</span>
            <button type="button" class="btn btn-sm btn-outline-secondary" id="cancelEditBtn">Отказ</button>
          </div>
          <form id="eventForm" novalidate>
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label for="titleInput" class="form-label">Заглавие</label>
                <input type="text" class="form-control" id="titleInput" required />
              </div>
              <div class="col-12 col-md-6">
                <label for="locationInput" class="form-label">Място</label>
                <input type="text" class="form-control" id="locationInput" />
              </div>
              <div class="col-12 col-md-6">
                <label for="startsAtInput" class="form-label">Начало</label>
                <input type="datetime-local" class="form-control" id="startsAtInput" required />
              </div>
              <div class="col-12 col-md-6">
                <label for="endsAtInput" class="form-label">Край</label>
                <input type="datetime-local" class="form-control" id="endsAtInput" />
              </div>
              <div class="col-12">
                <label for="descriptionInput" class="form-label">Описание</label>
                <textarea class="form-control" id="descriptionInput" rows="2"></textarea>
              </div>
            </div>
            <button type="submit" class="btn btn-primary mt-3" id="addEventBtn">
              <span
                class="spinner-border spinner-border-sm d-none me-1"
                role="status"
                aria-hidden="true"
                id="addEventSpinner"
              ></span>
              <span id="addEventBtnLabel">Добави събитие</span>
            </button>
          </form>
        </div>
      </div>

      <table class="table table-striped" id="eventsTable">
        <thead>
          <tr>
            <th>Кога</th>
            <th>Заглавие</th>
            <th>Място</th>
            <th>Описание</th>
            <th id="actionsHeader" class="d-none">Действия</th>
          </tr>
        </thead>
        <tbody id="eventsTableBody"></tbody>
      </table>
      <p class="text-muted d-none" id="emptyState">Няма предстоящи събития.</p>
    </main>
    <script type="module" src="/src/pages/calendar-page.js"></script>
  </body>
</html>
